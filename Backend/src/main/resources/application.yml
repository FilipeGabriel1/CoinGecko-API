spring:
  application:
    name: coingecko-api
  
  # Configuração JPA
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
    show-sql: false
  
  # DataSource H2 (desenvolvimento)
  datasource:
    url: jdbc:h2:mem:testdb
    driverClassName: org.h2.Driver
    username: sa
    password: 
  
  # H2 Console
  h2:
    console:
      enabled: true
      path: /h2-console

# Logging
logging:
  level:
    root: INFO
    com.coingecko: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG

# API CoinGecko
coingecko:
  api:
    enabled: true
    base-url: https://api.coingecko.com/api/v3

# Server
server:
  port: 8080
  servlet:
    context-path: /
